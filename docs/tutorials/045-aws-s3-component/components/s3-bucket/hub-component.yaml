version: 1
kind: component

requires:
  - aws
  - terraform

parameters:
  - name: hub.componentName
  - name: bucket.name
    value: "${hub.componentName}"
    env: TF_VAR_name
  - name: bucket.region
    env: TF_VAR_region
    empty: allow
    value: "us-east-1"
  - name: aws.serviceAccount
    env: TF_VAR_service_account_name
    empty: allow
  - name: aws.awsProfile
    env: TF_VAR_AWS_PROFILE
    empty: allow
    value: "fullAccessS3"

